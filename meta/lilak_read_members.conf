LKPulseFitData   fIsSaturated, fNDF, fChi2, fTb, fWidth, fIntegral, fAmplitude, fSlope

LKHit            fPadID, fX, fY, fZ, fTb, fSection, fLayer, fRow, fX:fZ, fY:fZ
LKHitArray
LKMCStep         fTrackID, fX, fY, fZ, fTime, fEdep, fEdep:fTime, fX:fX, fY:fX
LKVertex         fX, fY, fZ, fTb, fRow, fX:fZ, fY:fZ
