# Suggested TTree::Draw member examples for macros generated by `lilak read`.
# Format:
#   ClassName    expr1, expr2, expr3 ...
#
# Expressions are member-based because TTree::Draw is most reliable with
# persistent data members. 2D expressions containing `:` are drawn with `colz`.

